title: A place for 
email: keyboardbandit@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Original stories and TTRPG write-ups. Explore imaginative worlds, 
  discover intriguing new characters, and embark on epic, unforgettable adventures. 
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
theme: jekyll-theme-midnight
plugins:
  - jekyll-feed

# Pages to include
collections:
  reports:
    output: true
    permalink: /reports/:path/
  stories:
    output: true
    permalink: /stories/:path/
  
